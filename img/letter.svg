<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 520" width="400" height="520">
  <defs>
    <linearGradient id="parchment" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f0e0"/>
      <stop offset="50%" style="stop-color:#ede0c8"/>
      <stop offset="100%" style="stop-color:#e8d5b0"/>
    </linearGradient>
    <linearGradient id="edge" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#d4c4a0"/>
      <stop offset="100%" style="stop-color:#c9b890"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.3"/>
    </filter>
  </defs>
  <!-- Scroll body -->
  <rect x="30" y="40" width="340" height="440" rx="4" fill="url(#parchment)" filter="url(#shadow)"/>
  <!-- Rolled top -->
  <ellipse cx="200" cy="40" rx="170" ry="18" fill="url(#edge)"/>
  <ellipse cx="200" cy="38" rx="165" ry="14" fill="#e8dcc0"/>
  <!-- Rolled bottom -->
  <ellipse cx="200" cy="480" rx="170" ry="18" fill="url(#edge)"/>
  <ellipse cx="200" cy="482" rx="165" ry="14" fill="#e0d4b8"/>
  <!-- Decorative border -->
  <rect x="50" y="70" width="300" height="380" fill="none" stroke="#c9a962" stroke-width="0.5" opacity="0.5"/>
  <rect x="55" y="75" width="290" height="370" fill="none" stroke="#c9a962" stroke-width="0.3" opacity="0.3"/>
  <!-- Corner ornaments -->
  <path d="M60 80 L80 80 L80 85 L65 85 L65 100 L60 100 Z" fill="#c9a962" opacity="0.4"/>
  <path d="M340 80 L320 80 L320 85 L335 85 L335 100 L340 100 Z" fill="#c9a962" opacity="0.4"/>
  <path d="M60 440 L80 440 L80 435 L65 435 L65 420 L60 420 Z" fill="#c9a962" opacity="0.4"/>
  <path d="M340 440 L320 440 L320 435 L335 435 L335 420 L340 420 Z" fill="#c9a962" opacity="0.4"/>
  <!-- Text lines (decorative) -->
  <line x1="80" y1="130" x2="320" y2="130" stroke="#c9a962" stroke-width="0.5" opacity="0.3"/>
  <line x1="80" y1="160" x2="280" y2="160" stroke="#d4c4a0" stroke-width="0.4" opacity="0.25"/>
  <line x1="80" y1="190" x2="300" y2="190" stroke="#d4c4a0" stroke-width="0.4" opacity="0.25"/>
  <!-- Center monogram area -->
  <text x="200" y="280" text-anchor="middle" font-family="Georgia, serif" font-size="28" fill="#6b2d3c" opacity="0.6" font-style="italic">… &amp; B</text>
  <line x1="80" y1="320" x2="320" y2="320" stroke="#c9a962" stroke-width="0.5" opacity="0.3"/>
  <line x1="80" y1="350" x2="260" y2="350" stroke="#d4c4a0" stroke-width="0.4" opacity="0.25"/>
  <line x1="80" y1="380" x2="290" y2="380" stroke="#d4c4a0" stroke-width="0.4" opacity="0.25"/>
  <!-- Age spots / texture -->
  <circle cx="100" cy="200" r="3" fill="#d4c4a0" opacity="0.15"/>
  <circle cx="300" cy="350" r="4" fill="#d4c4a0" opacity="0.12"/>
  <circle cx="150" cy="400" r="2" fill="#d4c4a0" opacity="0.1"/>
  <circle cx="280" cy="150" r="2.5" fill="#d4c4a0" opacity="0.13"/>
</svg>
